name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name "CAD-Renamer" cad_renamer.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: CAD-Renamer-EXE
          path: dist/CAD-Renamer.exe
          retention-days: 90
